<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tapper — games.daevud.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Teko:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080808;
    --surface: #0f0f0f;
    --border: #1e1e1e;
    --accent: #e8c97a;
    --accent2: #4a9eff;
    --text: #d0d0d0;
    --muted: #444;
    --scanline: rgba(255,255,255,0.015);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      var(--scanline) 2px,
      var(--scanline) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  .wrap {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 20px 48px;
    position: relative;
    z-index: 1;
  }

  nav {
    padding: 20px 0 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--muted);
  }

  nav a {
    color: var(--muted);
    text-decoration: none;
    transition: color 0.15s;
  }

  nav a:hover { color: var(--accent); }

  .breadcrumb { display: flex; gap: 8px; align-items: center; }
  .breadcrumb span { color: #222; }

  header {
    padding: 32px 0 24px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }

  h1 {
    font-family: 'Teko', sans-serif;
    font-weight: 400;
    font-size: 56px;
    line-height: 0.9;
    color: #fff;
    letter-spacing: 0.04em;
  }

  .hud-bar {
    display: flex;
    gap: 28px;
    align-items: flex-end;
  }

  .hud-item {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }

  .hud-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .hud-val {
    font-size: 22px;
    font-family: 'Teko', sans-serif;
    font-weight: 400;
    color: #fff;
    line-height: 1;
  }

  #hi-val { color: var(--accent); }

  .game-container {
    position: relative;
    background: #0a0a0a;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  #canvas {
    display: block;
    width: 100%;
    height: auto;
  }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.88);
    gap: 10px;
  }

  #overlay h2 {
    font-family: 'Teko', sans-serif;
    font-weight: 400;
    font-size: 42px;
    color: #fff;
    letter-spacing: 0.06em;
  }

  #overlay .sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-align: center;
    line-height: 1.8;
  }

  #overlay button {
    margin-top: 14px;
    padding: 10px 32px;
    background: transparent;
    border: 1px solid var(--accent);
    border-radius: 2px;
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: background 0.15s;
    text-transform: uppercase;
  }

  #overlay button:hover { background: rgba(232,201,122,0.08); }

  .controls {
    display: flex;
    gap: 24px;
    margin-top: 18px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    flex-wrap: wrap;
  }

  .controls span { color: #555; }

  .controls kbd {
    display: inline-block;
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 3px;
    padding: 1px 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: #888;
    margin-right: 4px;
  }

  @media (max-width: 520px) {
    header { flex-direction: column; align-items: flex-start; gap: 16px; }
    .hud-bar { gap: 20px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <nav>
    <div class="breadcrumb">
      <a href="../">games.daevud.com</a>
      <span>/</span>
      <span>tapper</span>
    </div>
    <div id="status-line">ready</div>
  </nav>

  <header>
    <h1>TAPPER</h1>
    <div class="hud-bar">
      <div class="hud-item">
        <div class="hud-label">Score</div>
        <div class="hud-val" id="score-display">0</div>
      </div>
      <div class="hud-item">
        <div class="hud-label">Level</div>
        <div class="hud-val" id="level-display">1</div>
      </div>
      <div class="hud-item">
        <div class="hud-label">Lives</div>
        <div class="hud-val" id="lives-display">♥♥♥</div>
      </div>
      <div class="hud-item">
        <div class="hud-label">Best</div>
        <div class="hud-val" id="hi-val">0</div>
      </div>
    </div>
  </header>

  <div class="game-container">
    <canvas id="canvas" width="640" height="400"></canvas>
    <div id="overlay">
      <h2 id="ov-title">TAPPER</h2>
      <div class="sub" id="ov-sub">Serve customers before they reach the bar.<br>Catch the empty mugs sliding back.</div>
      <button id="start-btn">▶ start game</button>
    </div>
  </div>

  <div class="controls">
    <div><kbd>↑</kbd><kbd>↓</kbd> move</div>
    <div><kbd>space</kbd> serve</div>
    <div><kbd>click</kbd> tap lane to serve</div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = 640, H = 400;
canvas.width = W; canvas.height = H;

const NUM_LANES = 4;
const LANE_H = H / NUM_LANES;
const BAR_X = 64;
const BAR_END = W - 32;
const BARTENDER_W = 30, BARTENDER_H = 38;
const MUG_W = 20, MUG_H = 15;
const CUST_W = 28, CUST_H = 36;

let state, animId;

function laneY(i) { return i * LANE_H + LANE_H / 2; }

function initState() {
  return {
    bartenderLane: 0,
    score: 0,
    lives: 3,
    level: 1,
    mugs: [],
    customers: [],
    returnMusgs: [],
    spawnTimer: 0,
    spawnInterval: 160,
    phase: 'play',
    flashLane: -1,
    flashTimer: 0,
    nextMugId: 0,
    frameCount: 0,
  };
}

function custSpeed(lvl) { return 0.5 + lvl * 0.13; }
function mugSpeed() { return 6; }
function returnMugSpeed() { return 4.2; }

function spawnCustomer(s) {
  const usedLanes = new Set(s.customers.map(c => c.lane));
  const free = [0,1,2,3].filter(l => !usedLanes.has(l));
  if (free.length === 0) return;
  const lane = free[Math.floor(Math.random() * free.length)];
  s.customers.push({ lane, x: W - CUST_W - 8, alive: true });
}

function serveMug(s) {
  const lane = s.bartenderLane;
  if (s.mugs.some(m => m.lane === lane)) return;
  s.mugs.push({ id: s.nextMugId++, lane, x: BAR_X + BARTENDER_W + 6, alive: true });
}

function update(s) {
  if (s.phase !== 'play') return;
  s.frameCount++;
  s.spawnTimer++;
  if (s.spawnTimer >= s.spawnInterval) {
    s.spawnTimer = 0;
    spawnCustomer(s);
    s.spawnInterval = Math.max(55, 160 - s.level * 14);
  }
  if (s.flashTimer > 0) s.flashTimer--;

  for (const m of s.mugs) {
    if (!m.alive) continue;
    m.x += mugSpeed();
    for (const c of s.customers) {
      if (!c.alive || c.lane !== m.lane) continue;
      if (m.x + MUG_W >= c.x && m.x < c.x + CUST_W) {
        m.alive = false;
        c.x = Math.max(BAR_X + CUST_W + 12, c.x - 32);
        s.score += 10;
        s.returnMusgs.push({ lane: m.lane, x: c.x - MUG_W - 2, alive: true });
        break;
      }
    }
    if (m.alive && m.x > BAR_END + MUG_W) m.alive = false;
  }
  s.mugs = s.mugs.filter(m => m.alive);

  for (const r of s.returnMusgs) {
    if (!r.alive) continue;
    r.x -= returnMugSpeed();
    if (r.x + MUG_W < BAR_X - 10) {
      r.alive = false;
      s.score += 5;
    } else if (r.lane === s.bartenderLane && r.x < BAR_X + BARTENDER_W && r.x + MUG_W > BAR_X) {
      r.alive = false;
      s.score += 5;
    }
  }
  s.returnMusgs = s.returnMusgs.filter(r => r.alive);

  for (const c of s.customers) {
    if (!c.alive) continue;
    c.x -= custSpeed(s.level);
    if (c.x <= BAR_X + BARTENDER_W - 4) {
      s.lives--;
      s.flashLane = c.lane;
      s.flashTimer = 35;
      c.alive = false;
      if (s.lives <= 0) { s.phase = 'over'; }
    }
  }
  s.customers = s.customers.filter(c => c.alive);

  if (s.score >= s.level * 180) s.level++;

  updateHUD(s);
}

function drawScene(s) {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#080808';
  ctx.fillRect(0, 0, W, H);

  for (let i = 0; i < NUM_LANES; i++) {
    const y = i * LANE_H;
    ctx.fillStyle = i % 2 === 0 ? '#0e0e0e' : '#0a0a0a';
    ctx.fillRect(0, y, W, LANE_H);
    if (s.flashLane === i && s.flashTimer > 0) {
      ctx.fillStyle = `rgba(220,80,80,${s.flashTimer / 35 * 0.2})`;
      ctx.fillRect(0, y, W, LANE_H);
    }
    const cy = laneY(i);
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 0.5;
    ctx.setLineDash([4, 10]);
    ctx.beginPath();
    ctx.moveTo(BAR_X + BARTENDER_W + 6, cy);
    ctx.lineTo(BAR_END, cy);
    ctx.stroke();
    ctx.setLineDash([]);
    // lane separator
    if (i > 0) {
      ctx.strokeStyle = '#111';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, y); ctx.lineTo(W, y);
      ctx.stroke();
    }
  }

  // bar wall
  ctx.fillStyle = '#121212';
  ctx.fillRect(0, 0, BAR_X + 2, H);
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(BAR_X - 1, 0, 2, H);

  // taps
  for (let i = 0; i < NUM_LANES; i++) {
    const cy = laneY(i);
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(BAR_X - 14, cy - 12, 8, 24);
    ctx.fillStyle = '#3a3a3a';
    ctx.beginPath();
    ctx.arc(BAR_X - 10, cy - 12, 5, 0, Math.PI * 2);
    ctx.fill();
  }

  // active lane highlight
  ctx.fillStyle = 'rgba(74,158,255,0.04)';
  ctx.fillRect(BAR_X, s.bartenderLane * LANE_H, W - BAR_X, LANE_H);

  // bartender
  const bx = BAR_X + 4;
  const by = laneY(s.bartenderLane) - BARTENDER_H / 2;
  ctx.fillStyle = '#1a3a66';
  ctx.fillRect(bx, by + 10, BARTENDER_W, BARTENDER_H - 10);
  ctx.fillStyle = '#4a9eff';
  ctx.fillRect(bx + 2, by, BARTENDER_W - 4, BARTENDER_H - 12);
  ctx.fillStyle = '#f0d0a0';
  ctx.beginPath();
  ctx.arc(bx + BARTENDER_W / 2, by + 2, 8, 0, Math.PI * 2);
  ctx.fill();
  // apron
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.fillRect(bx + 4, by + 10, BARTENDER_W - 8, BARTENDER_H - 16);

  // mugs
  for (const m of s.mugs) drawMug(ctx, m.x, laneY(m.lane), false);
  for (const r of s.returnMusgs) { if (r.alive) drawMug(ctx, r.x, laneY(r.lane), true); }

  // customers
  for (const c of s.customers) drawCustomer(ctx, c.x, laneY(c.lane));
}

function drawMug(ctx, x, cy, returning) {
  const y = cy - MUG_H / 2;
  ctx.fillStyle = returning ? '#b89040' : '#e8c97a';
  ctx.fillRect(x, y, MUG_W, MUG_H);
  ctx.fillStyle = returning ? '#906020' : '#c8a030';
  ctx.fillRect(x + 2, y + 3, MUG_W - 4, MUG_H - 6);
  ctx.strokeStyle = returning ? '#705010' : '#a88020';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(x, y, MUG_W, MUG_H);
  ctx.fillStyle = returning ? '#906020' : '#d4a840';
  ctx.fillRect(x + MUG_W, cy - 4, 5, 8);
}

function drawCustomer(ctx, x, cy) {
  const y = cy - CUST_H / 2;
  ctx.fillStyle = '#7a1a1a';
  ctx.fillRect(x + 2, y + 16, CUST_W - 4, CUST_H - 16);
  ctx.fillStyle = '#c04040';
  ctx.fillRect(x + 4, y + 4, CUST_W - 8, 14);
  ctx.fillStyle = '#f0d0a0';
  ctx.beginPath();
  ctx.arc(x + CUST_W / 2, y + 9, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#3a1a00';
  ctx.fillRect(x, y + 2, CUST_W, 5);
}

function updateHUD(s) {
  document.getElementById('score-display').textContent = s.score;
  document.getElementById('level-display').textContent = s.level;
  document.getElementById('lives-display').textContent = '♥'.repeat(Math.max(0, s.lives));
  const hi = getHi();
  if (s.score > hi) saveHi(s.score);
  document.getElementById('hi-val').textContent = Math.max(s.score, hi);
  document.getElementById('status-line').textContent = s.phase === 'play' ? 'playing' : 'game over';
}

function getHi() {
  try { return parseInt(localStorage.getItem('daevud_tapper_hi') || '0'); } catch(e) { return 0; }
}
function saveHi(v) {
  try { localStorage.setItem('daevud_tapper_hi', v); } catch(e) {}
}

function gameLoop() {
  update(state);
  drawScene(state);
  if (state.phase === 'play') {
    animId = requestAnimationFrame(gameLoop);
  } else {
    showOverlay('over');
  }
}

function showOverlay(type) {
  const ov = document.getElementById('overlay');
  document.getElementById('ov-title').textContent = type === 'over' ? 'GAME OVER' : 'TAPPER';
  const hi = getHi();
  document.getElementById('ov-sub').innerHTML = type === 'over'
    ? `Score: ${state.score} &nbsp;|&nbsp; Level: ${state.level} &nbsp;|&nbsp; Best: ${hi}`
    : 'Serve customers before they reach the bar.<br>Catch the empty mugs sliding back.';
  document.getElementById('start-btn').textContent = type === 'over' ? '▶ play again' : '▶ start game';
  ov.style.display = 'flex';
}

function startGame() {
  if (animId) cancelAnimationFrame(animId);
  state = initState();
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('status-line').textContent = 'playing';
  gameLoop();
}

document.getElementById('start-btn').addEventListener('click', startGame);

document.addEventListener('keydown', e => {
  if (!state || state.phase !== 'play') return;
  if (e.key === 'ArrowUp' || e.key === 'w') {
    e.preventDefault();
    state.bartenderLane = Math.max(0, state.bartenderLane - 1);
  } else if (e.key === 'ArrowDown' || e.key === 's') {
    e.preventDefault();
    state.bartenderLane = Math.min(NUM_LANES - 1, state.bartenderLane + 1);
  } else if (e.key === ' ' || e.key === 'ArrowRight') {
    e.preventDefault();
    serveMug(state);
  }
});

canvas.addEventListener('click', e => {
  if (!state || state.phase !== 'play') return;
  const rect = canvas.getBoundingClientRect();
  const scaleY = H / rect.height;
  const cy = (e.clientY - rect.top) * scaleY;
  const lane = Math.floor(cy / LANE_H);
  if (lane >= 0 && lane < NUM_LANES) {
    state.bartenderLane = lane;
    serveMug(state);
  }
});

canvas.addEventListener('touchend', e => {
  if (!state || state.phase !== 'play') return;
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const scaleY = H / rect.height;
  const cy = (e.changedTouches[0].clientY - rect.top) * scaleY;
  const lane = Math.floor(cy / LANE_H);
  if (lane >= 0 && lane < NUM_LANES) {
    state.bartenderLane = lane;
    serveMug(state);
  }
}, { passive: false });

// init hi score display
document.getElementById('hi-val').textContent = getHi();
</script>
</body>
</html>
